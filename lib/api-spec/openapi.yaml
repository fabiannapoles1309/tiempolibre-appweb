      required: [status]

    SimpleOk:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    UserRole:
      type: string
      enum: [SUPERUSER, ADMIN, CLIENTE, DRIVER]

    OrderStatus:
      type: string
      enum: [PENDIENTE, ASIGNADO, EN_RUTA, ENTREGADO, CANCELADO]

    PaymentMethod:
      type: string
      enum: [EFECTIVO, TRANSFERENCIA, BILLETERA, TARJETA, CORTESIA]

    ZoneName:
      type: string
      enum: ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string
      required: [id, email, name, role, createdAt]

    AdminCreatedUser:
