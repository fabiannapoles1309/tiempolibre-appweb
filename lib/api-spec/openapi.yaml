openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Rapidoo - SaaS B2B de Entregas a Domicilio
servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session
  - name: orders
    description: Order management
  - name: drivers
    description: Driver management
  - name: zones
    description: Delivery zones
  - name: finance
    description: Financial reports and KPIs
  - name: wallet
    description: Customer digital wallet
  - name: reports
    description: Analytical reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ============== AUTH ==============
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user (or null if not signed in)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  # ============== ORDERS ==============
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders with optional filters
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/OrderStatus"
        - in: query
          name: zone
          schema:
            $ref: "#/components/schemas/ZoneName"
        - in: query
          name: customerId
          schema:
            type: integer
        - in: query
          name: driverId
          schema:
            type: integer
        - in: query
          name: from
          description: ISO date filter (createdAt >=)
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          description: ISO date filter (createdAt <=)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status or assignment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/assign-auto:
    post:
      operationId: assignOrdersAuto
      tags: [orders]
      summary: Auto-assign all pending orders to active drivers by zone (least-loaded)
      responses:
        "200":
          description: Result of auto-assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoAssignResult"

  /orders/{id}/assign-manual:
    post:
      operationId: assignOrderManual
      tags: [orders]
      summary: Manually assign a driver to an order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignManualBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============== DRIVERS ==============
  /drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      summary: List drivers
      responses:
        "200":
          description: Drivers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"
    post:
      operationId: createDriver
      tags: [drivers]
      summary: Create a driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriverBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}:
    patch:
      operationId: updateDriver
      tags: [drivers]
      summary: Update a driver
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDriverBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDriver
      tags: [drivers]
      summary: Delete a driver
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ============== ZONES ==============
  /zones:
    get:
      operationId: listZones
      tags: [zones]
      summary: List delivery zones
      responses:
        "200":
          description: Zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"

  # ============== FINANCE ==============
  /finance/summary:
    get:
      operationId: getFinanceSummary
      tags: [finance]
      summary: KPIs by range (day, week, month)
      parameters:
        - in: query
          name: range
          required: true
          schema:
            type: string
            enum: [day, week, month]
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceSummary"

  /finance/transactions:
    get:
      operationId: listTransactions
      tags: [finance]
      summary: List financial transactions
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  # ============== WALLET ==============
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get the current user's wallet
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/topup:
    post:
      operationId: topUpWallet
      tags: [wallet]
      summary: Add funds to the user's wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopUpBody"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/transactions:
    get:
      operationId: listWalletTransactions
      tags: [wallet]
      summary: List wallet transactions for the current user
      responses:
        "200":
          description: Wallet movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WalletTx"

  # ============== REPORTS ==============
  /reports/deliveries:
    get:
      operationId: getDeliveriesReport
      tags: [reports]
      summary: Deliveries grouped by day for a window
      parameters:
        - in: query
          name: range
          required: true
          schema:
            type: string
            enum: [day, week, month]
        - in: query
          name: zone
          schema:
            $ref: "#/components/schemas/ZoneName"
      responses:
        "200":
          description: Deliveries report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveriesPoint"

  /reports/drivers:
    get:
      operationId: getDriversReport
      tags: [reports]
      summary: Driver performance leaderboard
      parameters:
        - in: query
          name: range
          required: true
          schema:
            type: string
            enum: [day, week, month]
      responses:
        "200":
          description: Driver leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DriverPerformance"

  /reports/dashboard:
    get:
      operationId: getDashboard
      tags: [reports]
      summary: Aggregate dashboard KPIs and recent activity
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SimpleOk:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    UserRole:
      type: string
      enum: [ADMIN, CLIENTE, DRIVER]

    OrderStatus:
      type: string
      enum: [PENDIENTE, ASIGNADO, EN_RUTA, ENTREGADO, CANCELADO]

    PaymentMethod:
      type: string
      enum: [EFECTIVO, TRANSFERENCIA, BILLETERA]

    ZoneName:
      type: string
      enum: [Norte, Sur, Este, Oeste]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        createdAt:
          type: string
          format: date-time
      required: [id, email, name, role, createdAt]

    AuthSession:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    MeResponse:
      type: object
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/User"
            - type: "null"
      required: [user]

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 6
        role:
          $ref: "#/components/schemas/UserRole"
      required: [email, name, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    Zone:
      type: object
      properties:
        id:
          type: integer
        name:
          $ref: "#/components/schemas/ZoneName"
      required: [id, name]

    Driver:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        vehicle:
          type: string
        zones:
          type: array
          items:
            $ref: "#/components/schemas/ZoneName"
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, phone, vehicle, zones, active, createdAt]

    CreateDriverBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
        vehicle:
          type: string
          minLength: 1
        zones:
          type: array
          items:
            $ref: "#/components/schemas/ZoneName"
          minItems: 1
        active:
          type: boolean
      required: [name, phone, vehicle, zones]

    UpdateDriverBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        vehicle:
          type: string
        zones:
          type: array
          items:
            $ref: "#/components/schemas/ZoneName"
        active:
          type: boolean

    Order:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        pickup:
          type: string
        delivery:
          type: string
        zone:
          $ref: "#/components/schemas/ZoneName"
        payment:
          $ref: "#/components/schemas/PaymentMethod"
        amount:
          type: number
        status:
          $ref: "#/components/schemas/OrderStatus"
        driverId:
          type: ["integer", "null"]
        driverName:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - customerId
        - customerName
        - pickup
        - delivery
        - zone
        - payment
        - amount
        - status
        - driverId
        - driverName
        - notes
        - createdAt
        - updatedAt

    CreateOrderBody:
      type: object
      properties:
        pickup:
          type: string
          minLength: 1
        delivery:
          type: string
          minLength: 1
        zone:
          $ref: "#/components/schemas/ZoneName"
        payment:
          $ref: "#/components/schemas/PaymentMethod"
        amount:
          type: number
          exclusiveMinimum: 0
        notes:
          type: ["string", "null"]
      required: [pickup, delivery, zone, payment, amount]

    UpdateOrderBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
        driverId:
          type: ["integer", "null"]

    AssignManualBody:
      type: object
      properties:
        driverId:
          type: integer
      required: [driverId]

    AutoAssignResult:
      type: object
      properties:
        assigned:
          type: integer
        skipped:
          type: integer
        details:
          type: array
          items:
            type: object
            properties:
              orderId:
                type: integer
              driverId:
                type: ["integer", "null"]
              zone:
                $ref: "#/components/schemas/ZoneName"
              status:
                type: string
            required: [orderId, driverId, zone, status]
      required: [assigned, skipped, details]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: ["integer", "null"]
        amount:
          type: number
        type:
          type: string
          enum: [INGRESO, GASTO]
        method:
          $ref: "#/components/schemas/PaymentMethod"
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, orderId, amount, type, method, description, createdAt]

    FinanceSummary:
      type: object
      properties:
        range:
          type: string
        income:
          type: number
        expenses:
          type: number
        profit:
          type: number
        ordersCount:
          type: integer
        avgTicket:
          type: number
        byMethod:
          type: array
          items:
            type: object
            properties:
              method:
                $ref: "#/components/schemas/PaymentMethod"
              total:
                type: number
              count:
                type: integer
            required: [method, total, count]
        timeline:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              income:
                type: number
              expenses:
                type: number
            required: [date, income, expenses]
      required: [range, income, expenses, profit, ordersCount, avgTicket, byMethod, timeline]

    Wallet:
      type: object
      properties:
        userId:
          type: integer
        balance:
          type: number
        updatedAt:
          type: string
          format: date-time
      required: [userId, balance, updatedAt]

    TopUpBody:
      type: object
      properties:
        amount:
          type: number
          exclusiveMinimum: 0
        method:
          $ref: "#/components/schemas/PaymentMethod"
      required: [amount, method]

    WalletTx:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: number
        type:
          type: string
          enum: [TOPUP, PAGO, REEMBOLSO]
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, userId, amount, type, description, createdAt]

    DeliveriesPoint:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
        revenue:
          type: number
      required: [date, count, revenue]

    DriverPerformance:
      type: object
      properties:
        driverId:
          type: integer
        driverName:
          type: string
        zones:
          type: array
          items:
            $ref: "#/components/schemas/ZoneName"
        deliveries:
          type: integer
        revenue:
          type: number
        active:
          type: boolean
      required: [driverId, driverName, zones, deliveries, revenue, active]

    DashboardData:
      type: object
      properties:
        kpis:
          type: object
          properties:
            todayOrders:
              type: integer
            pendingOrders:
              type: integer
            inRouteOrders:
              type: integer
            deliveredToday:
              type: integer
            todayRevenue:
              type: number
            activeDrivers:
              type: integer
          required: [todayOrders, pendingOrders, inRouteOrders, deliveredToday, todayRevenue, activeDrivers]
        ordersByStatus:
          type: array
          items:
            type: object
            properties:
              status:
                $ref: "#/components/schemas/OrderStatus"
              count:
                type: integer
            required: [status, count]
        ordersByZone:
          type: array
          items:
            type: object
            properties:
              zone:
                $ref: "#/components/schemas/ZoneName"
              count:
                type: integer
              revenue:
                type: number
            required: [zone, count, revenue]
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required: [kpis, ordersByStatus, ordersByZone, recentOrders]
