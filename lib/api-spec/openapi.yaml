          type: string
          format: email
        name:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 6
        role:
          $ref: "#/components/schemas/UserRole"
      required: [email, name, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
