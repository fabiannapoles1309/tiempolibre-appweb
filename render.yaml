# =============================================================================
# Rapidoo (TiempoLibre) — Render Blueprint
# =============================================================================
#
# Despliega el monorepo como tres recursos independientes en Render:
#
#   1) rapidoo-db        — PostgreSQL administrado.
#   2) tiempolibre-api   — Web Service (Node) con Express bundlazo por esbuild.
#                          Se conecta a la BD por la cadena que Render inyecta.
#   3) tiempolibre-web   — Static Site con el SPA de Vite servido como archivos
#                          estaticos + fallback a index.html.
#
# Como usarlo:
#
#   - Sube el repositorio a GitHub/GitLab/Bitbucket.
#   - En Render: New +  →  Blueprint  →  selecciona el repo.
#     Render detecta este archivo y crea los tres recursos automaticamente.
#   - Render genera SESSION_SECRET la primera vez (generateValue: true) y
#     resuelve CORS_ORIGIN / VITE_API_BASE_URL via fromService.host (ver
#     RENDER.md para la explicacion del cableado).
#   - Despues del primer deploy puedes mapear dominios propios desde el
#     dashboard sin tocar este archivo.
#
# Tier "free" sirve para pruebas. Para produccion sube a "starter" en cada
# recurso (la BD free se borra a los 90 dias).
# =============================================================================

databases:
  - name: rapidoo-db
    databaseName: rapidoo
    user: rapidoo
    plan: free          # Cambia a "basic-256mb" o superior para produccion.
    region: oregon
    postgresMajorVersion: "16"

services:
  # ---------------------------------------------------------------------------
  # API — Express + Drizzle, build con esbuild bundlazo.
  # ---------------------------------------------------------------------------
  - type: web
    name: tiempolibre-api
    runtime: node
    plan: free          # Sube a "starter" o superior para produccion.
    region: oregon
    rootDir: .
    autoDeploy: true
    # Render expone PORT automaticamente. El servidor escucha en process.env.PORT
    # con fallback a 8080 (artifacts/api-server/src/index.ts).
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: rapidoo-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true   # Render genera un valor seguro la primera vez.
      - key: CORS_ORIGIN
        # `host` devuelve el hostname publico de tiempolibre-web (ej.
        # tiempolibre-web.onrender.com). El servidor lo normaliza a
        # https://<host> automaticamente (ver canonicalOrigin en app.ts).
        fromService:
          type: web
          name: tiempolibre-web
          property: host

  # ---------------------------------------------------------------------------
  # SPA — React + Vite, servido como Static Site.
  # ---------------------------------------------------------------------------
  - type: web
    name: tiempolibre-web
    runtime: static
    plan: free
    region: oregon
    rootDir: .
    autoDeploy: true
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/delivery-saas run build
    staticPublishPath: artifacts/delivery-saas/dist
    pullRequestPreviewsEnabled: false
    envVars:
      # Bake-time: la URL base de la API que se inyecta en el bundle del SPA.
      # `host` devuelve el hostname de tiempolibre-api; main.tsx prepende
      # https:// automaticamente.
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: tiempolibre-api
          property: host
    # Fallback de SPA: cualquier ruta que no exista como archivo estatico
    # devuelve index.html para que React Router maneje el routing client-side.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Cache largo para los assets versionados de Vite.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
