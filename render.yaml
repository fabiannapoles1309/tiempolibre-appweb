# =============================================================================
# Render Blueprint for Rapidoo / TiempoLibre.
#
# Provisions:
#   - tiempolibre-db   PostgreSQL managed database
#   - tiempolibre-api  Express API (Docker build), public Web Service
#   - tiempolibre-web  React SPA (Vite), Static Site
#
# How to use (see RENDER.md for details):
#   1. Push this repo to GitHub/GitLab.
#   2. In Render Dashboard → New → Blueprint → connect this repo.
#   3. Render reads this file and creates all three resources in one shot.
#   4. After the first deploy completes, set the two `sync: false` env vars
#      (CORS_ORIGIN on the API, VITE_API_BASE_URL on the SPA) with the URLs
#      Render assigned, and trigger a redeploy of each service.
# =============================================================================

databases:
  - name: tiempolibre-db
    databaseName: rapidoo
    user: rapidoo
    plan: basic-256mb         # upgrade to standard or higher for production
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []           # empty = only Render services on the same account

services:
  # ---------------------------------------------------------------------------
  # API: Express server bundled with esbuild. Runs as a Web Service from the
  # existing Dockerfile. Listens on Render's $PORT (the app fails-fast if PORT
  # is not provided, so no default is needed).
  # ---------------------------------------------------------------------------
  - type: web
    name: tiempolibre-api
    runtime: docker
    plan: starter             # free, starter, standard, pro
    region: oregon
    dockerfilePath: ./artifacts/api-server/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: tiempolibre-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true   # Render generates a strong random value once
      # CORS_ORIGIN must be a comma-separated list of allowed SPA origins
      # (e.g. https://tiempolibre-web.onrender.com). The API throws at
      # startup if this is missing in production, so set it before the API
      # finishes its first deploy. See RENDER.md §3.
      - key: CORS_ORIGIN
        sync: false

  # ---------------------------------------------------------------------------
  # SPA: Vite build, served as a Render Static Site. The build reads
  # VITE_API_BASE_URL at compile time (Vite inlines it into the bundle), so
  # changing this env var requires triggering a redeploy of the static site.
  # ---------------------------------------------------------------------------
  - type: web
    name: tiempolibre-web
    runtime: static
    region: oregon
    autoDeployTrigger: commit
    buildCommand: corepack enable && corepack prepare pnpm@10.26.1 --activate && pnpm install --frozen-lockfile --filter "@workspace/delivery-saas..." && pnpm --filter @workspace/delivery-saas run build
    staticPublishPath: ./artifacts/delivery-saas/dist
    pullRequestPreviewsEnabled: false
    # SPA fallback so wouter / client routing works on hard reloads.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Hashed assets emitted by Vite are immutable; cache aggressively.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Don't cache the HTML shell so deploys propagate on the next request.
      - path: /index.html
        name: Cache-Control
        value: no-cache
      - path: /
        name: Cache-Control
        value: no-cache
    envVars:
      # Pin the Node version used during the static build so a future change
      # to Render's default image cannot silently break Corepack / pnpm.
      - key: NODE_VERSION
        value: "22.12.0"
      # Public URL of the API service — e.g. https://tiempolibre-api.onrender.com
      # Set this in the Render Dashboard once the API service has its hostname,
      # then trigger a manual deploy of the static site so Vite re-bakes the
      # bundle. See RENDER.md §3.
      - key: VITE_API_BASE_URL
        sync: false
