name: Deploy a Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: tiempo-libre-app-494607
  REGION: us-central1
  FRONTEND_SERVICE: tiempolibre-web
  API_SERVICE: tiempolibre-api
  WORKLOAD_IDENTITY_PROVIDER: projects/612959916526/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-deploy@tiempo-libre-app-494607.iam.gserviceaccount.com

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker

      - name: Build imagen
        run: |
          docker build \
            --build-arg VITE_API_URL=https://tiempolibre-api-612959916526.us-central1.run.app \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            -f artifacts/delivery-saas/Dockerfile .

      - name: Push imagen
        run: docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}

      - name: Deploy a Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker

      - name: Build imagen
        run: |
          docker build \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.API_SERVICE }}:${{ github.sha }} \
            -f artifacts/api-server/Dockerfile .

      - name: Push imagen
        run: docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.API_SERVICE }}:${{ github.sha }}

      - name: Deploy a Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.API_SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars="NODE_ENV=production,ADMIN_EMAIL=admin@tiempolibre.com,SUPERADMIN_EMAIL=fabian.napoles1309@gmail.com"