openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Rapidoo - SaaS B2B de Entregas a Domicilio
servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session
  - name: orders
    description: Order management
  - name: drivers
    description: Driver management
  - name: zones
    description: Delivery zones
  - name: finance
    description: Financial reports and KPIs
  - name: wallet
    description: Customer digital wallet
  - name: reports
    description: Analytical reports
  - name: pricing
    description: Editable pricing for plans and extra packages
  - name: admin
    description: Admin / SUPERUSER operations
  - name: me
    description: Current user (cliente / driver) operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ============== AUTH ==============
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user (or null if not signed in)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  # ============== ORDERS ==============
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders with optional filters
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/OrderStatus"
        - in: query
          name: zone
          schema:
            $ref: "#/components/schemas/ZoneName"
        - in: query
          name: customerId
          schema:
            type: integer
        - in: query
          name: driverId
          schema:
            type: integer
        - in: query
          name: from
          description: ISO date filter (createdAt >=)
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          description: ISO date filter (createdAt <=)
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status or assignment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/assign-auto:
    post:
      operationId: assignOrdersAuto
      tags: [orders]
      summary: Auto-assign all pending orders to active drivers by zone (least-loaded)
      responses:
        "200":
          description: Result of auto-assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoAssignResult"

  /orders/{id}/assign-manual:
    post:
      operationId: assignOrderManual
      tags: [orders]
      summary: Manually assign a driver to an order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignManualBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ============== DRIVERS ==============
  /drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      summary: List drivers
      responses:
        "200":
          description: Drivers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"
    post:
      operationId: createDriver
      tags: [drivers]
      summary: Create a driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriverBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}:
    patch:
      operationId: updateDriver
      tags: [drivers]
      summary: Update a driver
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDriverBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDriver
      tags: [drivers]
      summary: Delete a driver
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /drivers/ranking:
    get:
      operationId: getDriverRanking
      tags: [drivers]
      summary: Driver ranking by deliveries
      responses:
        "200":
          description: Ranking
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DriverRankingEntry"

  /drivers/{id}/cash-settle:
    post:
      operationId: settleDriverCash
      tags: [drivers]
      summary: Mark cash collected by a driver as settled (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettleCashBody"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /me/driver:
    get:
      operationId: getMyDriver
      tags: [drivers]
      summary: Driver record of the authenticated DRIVER user
      responses:
        "200":
          description: Driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/driver/status:
    patch:
      operationId: updateMyDriverStatus
      tags: [drivers]
      summary: Update own operational status (DRIVER only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDriverStatusBody"
      responses:
        "200":
          description: Driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  # ============== INCIDENTS ==============
  /incidents:
    get:
      operationId: listIncidents
      tags: [incidents]
      summary: List incidents (ADMIN sees all, DRIVER sees own)
      responses:
        "200":
          description: Incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Incident"
    post:
      operationId: createIncident
      tags: [incidents]
      summary: Report a new incident (DRIVER)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentBody"
      responses:
        "201":
          description: Incident created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /incidents/{id}:
    patch:
      operationId: updateIncident
      tags: [incidents]
      summary: Update an incident status (ADMIN)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIncidentBody"
      responses:
        "200":
          description: Incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  # ============== SUBSCRIPTIONS ==============
  /me/subscription:
    get:
      operationId: getMySubscription
      tags: [subscriptions]
      summary: Subscription of the authenticated CLIENTE
      responses:
        "200":
          description: Subscription wrapper
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MySubscriptionResponse"

  /subscriptions:
    get:
      operationId: listSubscriptions
      tags: [subscriptions]
      summary: List all subscriptions (ADMIN)
      responses:
        "200":
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscription"

  /subscriptions/subscribe:
    post:
      operationId: subscribe
      tags: [subscriptions]
      summary: Subscribe or change tier (CLIENTE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeBody"
      responses:
        "200":
          description: Active subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /me/customer:
    get:
      operationId: getMyCustomerProfile
      tags: [subscriptions]
      summary: Cliente's own customer profile (businessName, pickupAddress, zone, phone)
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerProfile"

  /me/subscription/recharge:
    post:
      operationId: rechargeSubscription
      tags: [subscriptions]
      summary: Add a 35-delivery recharge block to the active CLIENTE subscription
      responses:
        "200":
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  # ============== ADMIN MANAGEMENT ==============
  /admin/clientes:
    get:
      operationId: adminListClientes
      tags: [admin]
      summary: List all CLIENTE users with their customer profile and active subscription summary (ADMIN/SUPERUSER)
      responses:
        "200":
          description: Clientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminClienteRow"

  /admin/clientes/{id}:
    patch:
      operationId: adminUpdateCliente
      tags: [admin]
      summary: Update a CLIENTE profile (name, businessName, pickupAddress, zone, phone, tier) (ADMIN/SUPERUSER)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateClienteBody"
      responses:
        "200":
          description: Updated cliente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClienteRow"

  /admin/clientes/{id}/recharge:
    post:
      operationId: adminRechargeCliente
      tags: [admin]
      summary: Add a 35-envío recharge block to a cliente's subscription (ADMIN/SUPERUSER)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cliente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClienteRow"

  /admin/clientes/{id}/renew:
    post:
      operationId: adminRenewCliente
      tags: [admin]
      summary: Renew/reactivate a cliente subscription with a fresh block (ADMIN/SUPERUSER)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cliente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClienteRow"

  /finance/export/excel:
    get:
      operationId: financeExportExcel
      tags: [finance]
      summary: Download an Excel report (deliveries / plans / accounting) by period and optional cliente (ADMIN/SUPERUSER)
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [deliveries, plans, accounting]
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [day, week, month, year]
        - name: clienteId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: XLSX file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /admin/users:
    post:
      operationId: adminCreateUser
      tags: [admin]
      summary: Create a CLIENTE (with optional plan) or DRIVER (with full account) (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCreatedUser"

  /admin/customer-deliveries:
    get:
      operationId: adminCustomerDeliveries
      tags: [admin]
      summary: Per-customer remaining deliveries (ADMIN)
      responses:
        "200":
          description: Rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerDeliveriesRow"

  /admin/cash-by-customer:
    get:
      operationId: adminCashByCustomer
      tags: [admin]
      summary: Cash pending by customer (drivers owe per restaurant) (ADMIN)
      responses:
        "200":
          description: Rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashByCustomerRow"

  /me/driver/benefits:
    get:
      operationId: getMyDriverBenefits
      tags: [drivers]
      summary: Driver self-service progress and unlocked benefits
      parameters:
        - in: query
          name: year
          schema: { type: integer }
        - in: query
          name: month
          schema: { type: integer, minimum: 1, maximum: 12 }
      responses:
        "200":
          description: Progress summary for the authenticated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverBenefitsProgress"

  /admin/benefit-items:
    get:
      operationId: listBenefitItems
      tags: [admin]
      summary: List concrete benefit items per level (ADMIN)
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BenefitItem"
    post:
      operationId: createBenefitItem
      tags: [admin]
      summary: Create a benefit item for a level (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BenefitItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenefitItem"
  /admin/benefit-items/{id}:
    delete:
      operationId: deleteBenefitItem
      tags: [admin]
      summary: Delete a benefit item (ADMIN)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /admin/benefits-tracking:
    get:
      operationId: getBenefitsTracking
      tags: [admin]
      summary: Monthly benefits tracking dashboard (ADMIN)
      parameters:
        - in: query
          name: year
          schema: { type: integer }
        - in: query
          name: month
          schema: { type: integer, minimum: 1, maximum: 12 }
      responses:
        "200":
          description: Tracking rows for the requested period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenefitsTrackingResponse"

  /admin/benefits-tracking/claim:
    post:
      operationId: setBenefitClaim
      tags: [admin]
      summary: Mark a benefit item as delivered or pending for a driver in a month (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driverId: { type: integer }
                benefitItemId: { type: integer }
                year: { type: integer }
                month: { type: integer, minimum: 1, maximum: 12 }
                delivered: { type: boolean }
              required: [driverId, benefitItemId, year, month, delivered]
      responses:
        "200":
          description: Updated claim status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /admin/benefits-tracking/export:
    get:
      operationId: exportBenefitsTracking
      tags: [admin]
      summary: Export winning drivers and pending benefits to Excel (ADMIN)
      parameters:
        - in: query
          name: year
          schema: { type: integer }
        - in: query
          name: month
          schema: { type: integer, minimum: 1, maximum: 12 }
      responses:
        "200":
          description: XLSX file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /admin/benefits-config:
    get:
      operationId: getBenefitsConfig
      tags: [admin]
      summary: Get configurable benefit levels for drivers (ADMIN)
      responses:
        "200":
          description: Levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BenefitLevel"
    put:
      operationId: putBenefitsConfig
      tags: [admin]
      summary: Replace benefit-level configuration (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                levels:
                  type: array
                  items:
                    $ref: "#/components/schemas/BenefitLevelInput"
              required: [levels]
      responses:
        "200":
          description: Updated levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BenefitLevel"

  /finance/today-split:
    get:
      operationId: getFinanceTodaySplit
      tags: [finance]
      summary: Today's revenue split between deliveries and subscription plans (ADMIN)
      responses:
        "200":
          description: Today split
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodaySplit"

  # ============== ADMIN FINANCE EXTRAS ==============
  /finance/cash-report:
    get:
      operationId: getCashReport
      tags: [finance]
      summary: Cash collected vs settled per driver (ADMIN)
      responses:
        "200":
          description: Cash report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashReport"

  /finance/b2b-revenue:
    get:
      operationId: getB2BRevenue
      tags: [finance]
      summary: Revenue and MRR by client (ADMIN)
      responses:
        "200":
          description: B2B revenue report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/B2BRevenueReport"

  # ============== ZONES ==============
  /zones:
    get:
      operationId: listZones
      tags: [zones]
      summary: List delivery zones
      responses:
        "200":
          description: Zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"

  # ============== FINANCE ==============
  /finance/summary:
    get:
      operationId: getFinanceSummary
      tags: [finance]
      summary: KPIs by range (day, week, month)
      parameters:
        - in: query
          name: range
          required: true
          schema:
            type: string
            enum: [day, week, month]
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceSummary"

  /finance/transactions:
    get:
      operationId: listTransactions
      tags: [finance]
      summary: List financial transactions
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  # ============== WALLET ==============
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get the current user's wallet
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/topup:
    post:
      operationId: topUpWallet
      tags: [wallet]
      summary: Add funds to the user's wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopUpBody"
      responses:
        "200":
          description: Updated wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/transactions:
    get:
      operationId: listWalletTransactions
      tags: [wallet]
      summary: List wallet transactions for the current user
      responses:
        "200":
          description: Wallet movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WalletTx"

  # ============== PRICING SETTINGS ==============
  /pricing-settings:
    get:
      operationId: getPricingSettings
      tags: [pricing]
      summary: Read editable pricing for plans and the extra-package add-on
      responses:
        "200":
          description: Current pricing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingSettings"

  /admin/pricing-settings:
    put:
      operationId: updatePricingSettings
      tags: [pricing]
      summary: Update plan + extra-package prices (ADMIN/SUPERUSER)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePricingSettingsBody"
      responses:
        "200":
          description: Updated pricing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingSettings"

  # ============== REPORTS ==============
  /reports/deliveries:
    get:
      operationId: getDeliveriesReport
      tags: [reports]
      summary: Deliveries grouped by day for a window
      parameters:
        - in: query
          name: range
          required: true
          schema:
            type: string
            enum: [day, week, month]
        - in: query
          name: zone
          schema:
            $ref: "#/components/schemas/ZoneName"
      responses:
        "200":
          description: Deliveries report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveriesPoint"

  /reports/drivers:
    get:
      operationId: getDriversReport
      tags: [reports]
      summary: Driver performance leaderboard
      parameters:
        - in: query
          name: range
          required: true
          schema:
            type: string
            enum: [day, week, month]
      responses:
        "200":
          description: Driver leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DriverPerformance"

  /reports/dashboard:
    get:
      operationId: getDashboard
      tags: [reports]
      summary: Aggregate dashboard KPIs and recent activity
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  # ============== STAFF (ADMIN/SUPERUSER directory) ==============
  /admin/staff-users:
    get:
      operationId: listStaffUsers
      tags: [admin]
      summary: List ADMIN and SUPERUSER staff with their email addresses.
      responses:
        "200":
          description: Staff users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffUser"

  # ============== COMBINED EXCEL REPORT ==============
  /admin/reports/combined:
    get:
      operationId: downloadCombinedReport
      tags: [reports]
      summary: Combined Excel report (envíos + cash) per cliente, grouped by period.
      parameters:
        - in: query
          name: period
          required: true
          schema:
            type: string
            enum: [DAY, WEEK, MONTH, YEAR]
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  # ============== FEEDBACK (Quejas y Sugerencias) ==============
  /me/feedback:
    post:
      operationId: createMyFeedback
      tags: [me]
      summary: Submit a complaint or suggestion. Notifies admins by email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedbackBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/feedback:
    get:
      operationId: listFeedback
      tags: [admin]
      summary: Admin list of all feedback (quejas + sugerencias).
      responses:
        "200":
          description: Feedback list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminFeedbackRow"

components:
  schemas:
    HealthStatus:
