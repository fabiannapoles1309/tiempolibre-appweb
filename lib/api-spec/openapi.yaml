          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
        vehicle:
          type: string
          minLength: 1
        zones:
          type: array
          items:
            $ref: "#/components/schemas/ZoneName"
          minItems: 1
        active:
          type: boolean
        licensePlate:
          type: ["string", "null"]
        circulationCard:
          type: ["string", "null"]
        circulationCardExpiry:
          type: ["string", "null"]
