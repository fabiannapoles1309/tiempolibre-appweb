name: Deploy a Google Cloud Run
on:
  push:
    branches:
      - main
env:
  PROJECT_ID: tiempo-libre-app-494607
  REGION: us-central1
jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/612959916526/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@tiempo-libre-app-494607.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Frontend a Cloud Run
        run: |
          gcloud run deploy tiempolibre-web \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8080 \
            --project tiempo-libre-app-494607
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/612959916526/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@tiempo-libre-app-494607.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy API a Cloud Run
        run: |
          gcloud run deploy tiempolibre-api \
            --source artifacts/api-server \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8080 \
            --project tiempo-libre-app-494607 \
            --set-env-vars="NODE_ENV=production,DATABASE_URL=${{ secrets.DATABASE_URL }},SESSION_SECRET=${{ secrets.SESSION_SECRET }}"