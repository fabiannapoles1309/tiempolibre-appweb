          type: string
        phone:
          type: string
        vehicle:
          type: string
        zones:
          type: array
          items:
            $ref: "#/components/schemas/ZoneName"
        active:
          type: boolean
        licensePlate:
          type: ["string", "null"]
        circulationCard:
          type: ["string", "null"]
        circulationCardExpiry:
          type: ["string", "null"]
          format: date
