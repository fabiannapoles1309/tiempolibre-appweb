kind = "web"
previewPath = "/"
title = "Rapidoo - SaaS de Entregas"
version = "1.0.0"
id = "artifacts/delivery-saas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24793

[services.development]
run = "pnpm --filter @workspace/delivery-saas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/delivery-saas", "run", "build" ]
publicDir = "artifacts/delivery-saas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24793"
BASE_PATH = "/"
